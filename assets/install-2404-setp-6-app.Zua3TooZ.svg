<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" role="img" aria-labelledby="title desc">
  <title id="title">Ubuntu application selection screen mockup</title>
  <desc id="desc">A simplified SVG template of the Ubuntu installer applications and updates screen.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c1030"/>
      <stop offset="50%" stop-color="#5d183b"/>
      <stop offset="100%" stop-color="#1d1029"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#120812" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="880" height="600" rx="18" fill="#0b0b0d"/>
  <rect x="32" y="24" width="816" height="532" rx="12" fill="url(#bg)"/>
  <rect x="32" y="24" width="816" height="16" rx="12" fill="#efebe4"/>
  <circle cx="48" cy="32" r="4" fill="#ff5f57"/>
  <circle cx="62" cy="32" r="4" fill="#febc2e"/>
  <circle cx="76" cy="32" r="4" fill="#28c840"/>
  <rect x="78" y="72" width="738" height="454" rx="18" fill="#fcfbfb" filter="url(#shadow)"/>
  
  <rect x="32" y="40" width="816" height="28" fill="#181818"/>
  <text x="440" y="59" text-anchor="middle" font-size="13" fill="#f2f2f2" font-family="Helvetica, Arial, sans-serif">May 14 06:22</text>
  <rect x="32" y="68" width="42" height="468" fill="#251a28" opacity=".82"/>
  <g fill="#f0f0f0" opacity=".98">
    <circle cx="54" cy="86" r="8"/><circle cx="54" cy="132" r="8"/><circle cx="54" cy="178" r="8"/><circle cx="54" cy="224" r="8"/><circle cx="54" cy="270" r="8"/><circle cx="54" cy="316" r="8"/><circle cx="54" cy="362" r="8"/><circle cx="54" cy="408" r="8"/><circle cx="54" cy="500" r="8"/>
  </g>
  <rect x="778" y="394" width="46" height="68" rx="4" fill="#e95420" opacity=".92"/>
  <rect x="782" y="398" width="24" height="24" rx="4" fill="#fff" opacity=".9"/>
  <text x="801" y="446" text-anchor="middle" font-size="8" fill="#fff" font-family="Helvetica, Arial, sans-serif">Install Ubuntu</text>
  <rect x="786" y="474" width="30" height="30" rx="4" fill="#6f626f" opacity=".65"/>
  <text x="801" y="524" text-anchor="middle" font-size="9" fill="#fff" font-family="Helvetica, Arial, sans-serif">Home</text>
  <text x="447" y="90" text-anchor="middle" font-size="14" fill="#7c7178" font-family="Helvetica, Arial, sans-serif">应用程序和更新</text>
  <circle cx="772" cy="88" r="8" fill="#f3f0f2" stroke="#d8d1d5"/>
  <path d="M768 84l8 8M776 84l-8 8" stroke="#8f838c" stroke-width="1.5"/>
  
  <g transform="translate(156 216)">
    <rect x="12" y="12" width="98" height="64" rx="10" fill="#fff" stroke="#d9d1d5"/>
    <path d="M24 28h60M24 40h44M24 52h68" stroke="#d4c7cc" stroke-width="3" stroke-linecap="round"/>
    <rect x="28" y="92" width="36" height="24" rx="5" fill="#fff7f4" stroke="#f0d4c9"/>
    <rect x="82" y="82" width="36" height="24" rx="5" fill="#fff7f4" stroke="#f0d4c9"/>
    <rect x="64" y="118" width="36" height="24" rx="5" fill="#fff7f4" stroke="#f0d4c9"/>
    <path d="M42 104h8M92 94h8M74 130h8" stroke="#e95420" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="420" y="170" font-size="15" fill="#5c5358" font-family="PingFang SC, Helvetica, Arial, sans-serif">您想先安装哪些应用</text>
  
  <rect x="420" y="220" width="278" height="48" rx="6" fill="#fff7f4" stroke="#f0a58b"/>
  <circle cx="442" cy="242" r="7" fill="#fff" stroke="#e95420" stroke-width="2"/><circle cx="442" cy="242" r="3" fill="#e95420"/>
  <text x="460" y="240" font-size="14" fill="#322e31" font-family="Helvetica, Arial, sans-serif">默认集合</text>
  <text x="460" y="256" font-size="11" fill="#8c8288" font-family="Helvetica, Arial, sans-serif">只安装必要软件、网络浏览器与基本工具。</text>

  
  <rect x="420" y="276" width="278" height="48" rx="6" fill="#fff" stroke="#e3dbe0"/>
  <circle cx="442" cy="298" r="7" fill="#fff" stroke="#cfc6cb"/>
  <text x="460" y="296" font-size="14" fill="#5a5057" font-family="Helvetica, Arial, sans-serif">扩展集合</text>
  <text x="460" y="312" font-size="11" fill="#8c8288" font-family="Helvetica, Arial, sans-serif">一批对离线用户友好的办公应用、工具与网络浏览器。</text>


  <rect x="126" y="488" width="82" height="28" rx="8" fill="#fff" stroke="#d9d1d5"/><text x="167" y="506" text-anchor="middle" font-size="12" fill="#7f737a" font-family="PingFang SC, Helvetica, Arial, sans-serif">返回</text>
  <rect x="688" y="488" width="92" height="30" rx="8" fill="#f2f2f3"/>
  <text x="734" y="507" text-anchor="middle" font-size="14" fill="#aca5ab" font-family="PingFang SC, Helvetica, Arial, sans-serif">下一步</text>
  <g transform="translate(384 500)">
    <circle cx="0" cy="0" r="4" fill="#d6cfd3"/><circle cx="14" cy="0" r="4" fill="#d6cfd3"/><circle cx="28" cy="0" r="4" fill="#d6cfd3"/><circle cx="42" cy="0" r="4" fill="#d6cfd3"/><circle cx="56" cy="0" r="4" fill="#e95420"/><circle cx="70" cy="0" r="4" fill="#d6cfd3"/><circle cx="84" cy="0" r="4" fill="#d6cfd3"/><circle cx="98" cy="0" r="4" fill="#d6cfd3"/><circle cx="112" cy="0" r="4" fill="#d6cfd3"/><circle cx="126" cy="0" r="4" fill="#d6cfd3"/>
  </g>

</svg>
