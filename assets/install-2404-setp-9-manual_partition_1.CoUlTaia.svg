<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" role="img" aria-labelledby="title desc">
  <title id="title">Ubuntu installer manual partition mockup</title>
  <desc id="desc">A simplified SVG template of the Ubuntu installer manual partition screen.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c1030"/>
      <stop offset="50%" stop-color="#5c173a"/>
      <stop offset="100%" stop-color="#1d1029"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#120812" flood-opacity=".28"/>
    </filter>
  </defs>

  <rect width="880" height="600" rx="18" fill="#0b0b0d"/>
  <rect x="32" y="24" width="816" height="532" rx="12" fill="url(#bg)"/>
  <rect x="32" y="24" width="816" height="16" rx="12" fill="#efebe4"/>
  <circle cx="48" cy="32" r="4" fill="#ff5f57"/>
  <circle cx="62" cy="32" r="4" fill="#febc2e"/>
  <circle cx="76" cy="32" r="4" fill="#28c840"/>

  <rect x="78" y="72" width="738" height="454" rx="18" fill="#fcfbfb" filter="url(#shadow)"/>
  <text x="447" y="90" text-anchor="middle" font-size="14" fill="#7c7178" font-family="PingFang SC, Helvetica, Arial, sans-serif">手动分区</text>
  <circle cx="772" cy="88" r="8" fill="#f3f0f2" stroke="#d8d1d5"/>
  <path d="M768 84l8 8M776 84l-8 8" stroke="#8f838c" stroke-width="1.5"/>

  <rect x="126" y="114" width="640" height="10" rx="5" fill="#f2edf0"/>
  <rect x="126" y="114" width="178" height="10" rx="5" fill="#f5d5c8"/>
  <circle cx="118" cy="119" r="5" fill="#fff" stroke="#d8ced3"/>
  <text x="124" y="146" font-size="13" fill="#73686f" font-family="PingFang SC, Helvetica, Arial, sans-serif">剩余空间 68.72 GB</text>

  <rect x="126" y="154" width="640" height="252" rx="8" fill="#fff" stroke="#e7dee2"/>
  <rect x="126" y="154" width="640" height="26" rx="8" fill="#fbfafb"/>
  <text x="142" y="172" font-size="12" fill="#7a7076" font-family="PingFang SC, Helvetica, Arial, sans-serif">设备</text>
  <text x="286" y="172" font-size="12" fill="#7a7076" font-family="PingFang SC, Helvetica, Arial, sans-serif">类型</text>
  <text x="412" y="172" font-size="12" fill="#7a7076" font-family="PingFang SC, Helvetica, Arial, sans-serif">挂载点</text>
  <text x="500" y="172" font-size="12" fill="#7a7076" font-family="PingFang SC, Helvetica, Arial, sans-serif">大小</text>
  <text x="598" y="172" font-size="12" fill="#7a7076" font-family="PingFang SC, Helvetica, Arial, sans-serif">格式化</text>

  <rect x="126" y="180" width="640" height="34" fill="#fff"/>
  <rect x="146" y="192" width="10" height="10" rx="2" fill="#232326"/>
  <text x="170" y="201" font-size="13" fill="#373238" font-family="Helvetica, Arial, sans-serif">sda</text>
  <text x="498" y="201" font-size="13" fill="#5b5258" font-family="Helvetica, Arial, sans-serif">68.72 GB</text>

  <rect x="126" y="214" width="640" height="34" fill="#fcf3ef"/>
  <rect x="166" y="226" width="8" height="8" rx="2" fill="#f2d0bf" stroke="#d9c2b6"/>
  <text x="188" y="235" font-size="13" fill="#5d5459" font-family="PingFang SC, Helvetica, Arial, sans-serif">剩余空间</text>
  <text x="498" y="235" font-size="13" fill="#5b5258" font-family="Helvetica, Arial, sans-serif">68.72 GB</text>

  <g transform="translate(126 418)">
    <rect x="0" y="0" width="36" height="24" rx="6" fill="#fff" stroke="#d9d1d5"/>
    <path d="M18 5v14M11 12h14" stroke="#2f2a2d" stroke-width="1.8" stroke-linecap="round"/>
    <rect x="44" y="0" width="28" height="24" rx="6" fill="#fbfafb" stroke="#e7dee2"/>
    <path d="M52 12h12" stroke="#c8bec3" stroke-width="1.8" stroke-linecap="round"/>
    <rect x="80" y="0" width="36" height="24" rx="6" fill="#fbfafb" stroke="#e7dee2"/>
    <text x="98" y="16" text-anchor="middle" font-size="11" fill="#b3aab0" font-family="PingFang SC, Helvetica, Arial, sans-serif">更改</text>
  </g>

  <rect x="126" y="452" width="214" height="24" rx="5" fill="#efeff1"/>
  <text x="140" y="468" font-size="12" fill="#81767d" font-family="PingFang SC, Helvetica, Arial, sans-serif">用于安装引导程序的设备</text>
  <path d="M326 462l8 8 8-8" fill="none" stroke="#9f949b" stroke-width="1.5"/>

  <g transform="translate(657 418)">
    <rect x="0" y="0" width="68" height="28" rx="8" fill="#fbfafb" stroke="#e7dee2"/>
    <text x="34" y="18" text-anchor="middle" font-size="12" fill="#b3aab0" font-family="PingFang SC, Helvetica, Arial, sans-serif">新建分区表</text>
    <rect x="82" y="0" width="44" height="28" rx="8" fill="#fff" stroke="#d9d1d5"/>
    <text x="104" y="18" text-anchor="middle" font-size="12" fill="#7f737a" font-family="PingFang SC, Helvetica, Arial, sans-serif">返回</text>
  </g>

  <rect x="688" y="472" width="92" height="30" rx="8" fill="#f2f2f3"/>
  <text x="734" y="491" text-anchor="middle" font-size="14" fill="#aca5ab" font-family="PingFang SC, Helvetica, Arial, sans-serif">下一步</text>

  <g transform="translate(384 486)">
    <circle cx="0" cy="0" r="4" fill="#d6cfd3"/>
    <circle cx="14" cy="0" r="4" fill="#d6cfd3"/>
    <circle cx="28" cy="0" r="4" fill="#d6cfd3"/>
    <circle cx="42" cy="0" r="4" fill="#d6cfd3"/>
    <circle cx="56" cy="0" r="4" fill="#e95420"/>
    <circle cx="70" cy="0" r="4" fill="#d6cfd3"/>
    <circle cx="84" cy="0" r="4" fill="#d6cfd3"/>
    <circle cx="98" cy="0" r="4" fill="#d6cfd3"/>
  </g>
</svg>
