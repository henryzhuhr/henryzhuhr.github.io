<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" role="img" aria-labelledby="title desc">
  <title id="title">Ubuntu installer language selection mockup</title>
  <desc id="desc">A simplified SVG template of the Ubuntu installer language selection screen.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d0f2f"/>
      <stop offset="60%" stop-color="#5d183b"/>
      <stop offset="100%" stop-color="#1d0d2a"/>
    </linearGradient>
    <linearGradient id="wallpaper" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#471230"/>
      <stop offset="100%" stop-color="#6f2046"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#120812" flood-opacity=".28"/>
    </filter>
  </defs>

  <rect width="880" height="600" rx="18" fill="#0b0b0d"/>
  <rect x="32" y="24" width="816" height="532" rx="12" fill="url(#bg)"/>
  <rect x="32" y="24" width="816" height="16" rx="12" fill="#efebe4"/>
  <circle cx="48" cy="32" r="4" fill="#ff5f57"/>
  <circle cx="62" cy="32" r="4" fill="#febc2e"/>
  <circle cx="76" cy="32" r="4" fill="#28c840"/>

  <rect x="78" y="72" width="738" height="454" rx="18" fill="#fcfbfb" filter="url(#shadow)"/>
  <rect x="78" y="72" width="738" height="454" rx="18" fill="url(#wallpaper)" opacity=".05"/>
  <text x="447" y="90" text-anchor="middle" font-size="14" fill="#7c7178" font-family="PingFang SC, Helvetica, Arial, sans-serif">欢迎来到Ubuntu</text>
  <circle cx="772" cy="88" r="8" fill="#f3f0f2" stroke="#d8d1d5"/>
  <path d="M768 84l8 8M776 84l-8 8" stroke="#8f838c" stroke-width="1.5"/>

  <g transform="translate(152 156)">
    <rect x="0" y="118" width="36" height="36" rx="6" fill="#e95420"/>
    <circle cx="12" cy="136" r="5" fill="none" stroke="#fff" stroke-width="2"/>
    <circle cx="26" cy="126" r="4" fill="#fff"/>
    <circle cx="27" cy="146" r="4" fill="#fff"/>
    <path d="M16 133l7-4M16 139l7 4" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <text x="48" y="150" font-size="34" fill="#222" font-family="Helvetica, Arial, sans-serif">Ubuntu</text>
    <text x="0" y="195" font-size="14" fill="#9b8f96" font-family="Helvetica, Arial, sans-serif">24.04 LTS</text>
  </g>

  <g transform="translate(432 188)">
    <text x="0" y="0" font-size="15" fill="#5c5358" font-family="PingFang SC, Helvetica, Arial, sans-serif">选择您的语言：</text>
    <rect x="0" y="22" width="294" height="188" rx="8" fill="#fff" stroke="#e7dee2"/>
    <rect x="0" y="22" width="294" height="38" rx="8" fill="#fff7f4"/>
    <text x="16" y="46" font-size="15" fill="#e95420" font-family="PingFang SC, Helvetica, Arial, sans-serif">中文（简体）</text>
    <text x="16" y="82" font-size="15" fill="#585056" font-family="PingFang SC, Helvetica, Arial, sans-serif">中文（繁體）</text>
    <text x="16" y="114" font-size="15" fill="#585056" font-family="Helvetica, Arial, sans-serif">Ubuntu</text>
    <text x="16" y="146" font-size="15" fill="#585056" font-family="PingFang SC, Helvetica, Arial, sans-serif">日本語</text>
    <text x="16" y="178" font-size="15" fill="#585056" font-family="Helvetica, Arial, sans-serif">C</text>
    <rect x="280" y="34" width="4" height="72" rx="2" fill="#efe7ea"/>
    <rect x="280" y="34" width="4" height="24" rx="2" fill="#d3c6cc"/>
  </g>

  <g transform="translate(377 486)">
    <circle cx="0" cy="0" r="4" fill="#e95420"/>
    <circle cx="14" cy="0" r="4" fill="#d6cfd3"/>
    <circle cx="28" cy="0" r="4" fill="#d6cfd3"/>
    <circle cx="42" cy="0" r="4" fill="#d6cfd3"/>
    <circle cx="56" cy="0" r="4" fill="#d6cfd3"/>
    <circle cx="70" cy="0" r="4" fill="#d6cfd3"/>
    <circle cx="84" cy="0" r="4" fill="#d6cfd3"/>
    <circle cx="98" cy="0" r="4" fill="#d6cfd3"/>
    <circle cx="112" cy="0" r="4" fill="#d6cfd3"/>
    <circle cx="126" cy="0" r="4" fill="#d6cfd3"/>
  </g>

  <rect x="688" y="472" width="92" height="30" rx="8" fill="#f2f2f3"/>
  <text x="734" y="491" text-anchor="middle" font-size="14" fill="#aca5ab" font-family="PingFang SC, Helvetica, Arial, sans-serif">下一步</text>
</svg>
