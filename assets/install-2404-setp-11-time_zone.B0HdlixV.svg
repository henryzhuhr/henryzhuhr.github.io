  <path d="M768 84l8 8M776 84l-8 8" stroke="#8f838c" stroke-width="1.5"/>
  
  <rect x="126" y="126" width="280" height="24" rx="5" fill="#efeff1"/>
  <text x="138" y="142" font-size="12" fill="#857a81" font-family="PingFang SC, Helvetica, Arial, sans-serif">位置</text>
  <rect x="420" y="126" width="280" height="24" rx="5" fill="#efeff1"/>
  <text x="432" y="142" font-size="12" fill="#857a81" font-family="PingFang SC, Helvetica, Arial, sans-serif">时区</text>
  <text x="138" y="165" font-size="14" fill="#5a5057" font-family="Helvetica, Arial, sans-serif">Asia/Shanghai</text>
  <text x="432" y="165" font-size="14" fill="#5a5057" font-family="Helvetica, Arial, sans-serif">Shanghai (Shanghai, China)</text>
  <rect x="78" y="174" width="738" height="300" rx="0" fill="#a9c0e5"/>
  <path d="M116 220c40-24 88-36 124-24 32-26 72-24 104-8 40-14 90-2 132 14 36-18 72-18 114-8 26 8 54 6 78-6 30-8 66 6 88 22v154H116Z" fill="#fff" opacity=".98"/>
  <path d="M628 256l40 18 22 44-12 68-36 28-54-10-14-48 14-68 40-32Z" fill="#98d857"/>
  <rect x="624" y="176" width="28" height="300" fill="#7a9fd6" opacity=".65"/>
  <path d="M644 306l12 10-4 18-16 2-8-12 4-14Z" fill="#ff5b52"/>
  <circle cx="638" cy="322" r="8" fill="#ff5b52"/>
  <circle cx="638" cy="322" r="3" fill="#fff"/>

