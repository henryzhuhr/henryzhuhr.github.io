<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" role="img" aria-labelledby="title desc">
  <title id="title">Ubuntu 22.04 manual partition confirmation mockup</title>
  <desc id="desc">A simplified SVG template of the Ubuntu 22.04 partition table confirmation dialog.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c1030"/>
      <stop offset="50%" stop-color="#5d183b"/>
      <stop offset="100%" stop-color="#1d1029"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#120812" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="880" height="600" rx="18" fill="#0b0b0d"/>
  <rect x="32" y="24" width="816" height="532" rx="12" fill="url(#bg)"/>
  <rect x="32" y="24" width="816" height="16" rx="12" fill="#efebe4"/>
  <circle cx="48" cy="32" r="4" fill="#ff5f57"/>
  <circle cx="62" cy="32" r="4" fill="#febc2e"/>
  <circle cx="76" cy="32" r="4" fill="#28c840"/>
  <rect x="78" y="72" width="738" height="454" rx="18" fill="#fcfbfb" filter="url(#shadow)"/>
  
  <defs>
    <linearGradient id="bg2204" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c53146"/>
      <stop offset="100%" stop-color="#4b014f"/>
    </linearGradient>
    <filter id="shadow2204" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#120812" flood-opacity=".30"/>
    </filter>
  </defs>
  <rect x="32" y="24" width="816" height="532" rx="12" fill="url(#bg2204)"/>
  <path d="M120 230l220-90 150 48-238 120Z" fill="#d34a64" opacity=".15"/>
  <path d="M420 116l92-42 38 98-128 26Z" fill="#e06b7a" opacity=".12"/>
  <path d="M590 184l94-56 42 112-112 60Z" fill="#8a1a6a" opacity=".16"/>
  <rect x="164" y="78" width="552" height="438" rx="6" fill="#fff" filter="url(#shadow2204)"/>
  <rect x="164" y="78" width="552" height="24" rx="6" fill="#2f2d2f"/>
  <text x="440" y="95" text-anchor="middle" font-size="13" fill="#fff" font-family="PingFang SC, Helvetica, Arial, sans-serif">安装</text>
  <circle cx="690" cy="90" r="7" fill="#e95420"/>
  <path d="M686 86l8 8M694 86l-8 8" stroke="#fff" stroke-width="1.5"/>
  
  <text x="176" y="134" font-size="18" fill="#3e3940" font-family="PingFang SC, Helvetica, Arial, sans-serif">安装类型</text>
  <rect x="176" y="174" width="520" height="10" fill="#f3f1f3" stroke="#d9d1d5"/>
  <rect x="176" y="196" width="520" height="146" fill="#fff" stroke="#d9d1d5"/>
  <rect x="176" y="210" width="520" height="14" fill="#e95420"/>
  <text x="182" y="221" font-size="11" fill="#fff" font-family="Helvetica, Arial, sans-serif">/dev/sda</text>
  <rect x="164" y="102" width="552" height="414" fill="#000" opacity=".24"/>
  <rect x="222" y="270" width="430" height="96" rx="3" fill="#fff" stroke="#d9d1d5"/>
  <rect x="222" y="270" width="430" height="22" rx="3" fill="#2f2d2f"/>
  <text x="437" y="285" text-anchor="middle" font-size="12" fill="#fff" font-family="PingFang SC, Helvetica, Arial, sans-serif">要在此设备上创建新的空分区表吗？</text>
  <circle cx="644" cy="281" r="6" fill="#e95420"/>
  <path d="M641 278l6 6M647 278l-6 6" stroke="#fff" stroke-width="1.2"/>
  <text x="254" y="318" font-size="10" fill="#6b6268" font-family="PingFang SC, Helvetica, Arial, sans-serif">您选择了对整个设备进行分区。如果要在此设备上创建的分区表，那么现有的所有分区都将被删除。</text>
  <text x="254" y="340" font-size="10" fill="#6b6268" font-family="PingFang SC, Helvetica, Arial, sans-serif">注意：如果您希望的话，稍后依然可以撤消此动作。</text>
  <rect x="542" y="342" width="54" height="22" rx="3" fill="#fff7f4" stroke="#eaa48c"/><text x="569" y="357" text-anchor="middle" font-size="10" fill="#6c6168" font-family="PingFang SC, Helvetica, Arial, sans-serif">后退</text>
  <rect x="600" y="342" width="44" height="22" rx="3" fill="#fff" stroke="#d9d1d5"/><text x="622" y="357" text-anchor="middle" font-size="10" fill="#6c6168" font-family="PingFang SC, Helvetica, Arial, sans-serif">继续</text>

  <rect x="484" y="462" width="64" height="20" rx="3" fill="#fff" stroke="#d9d1d5"/>
  <text x="516" y="476" text-anchor="middle" font-size="11" fill="#6c6168" font-family="PingFang SC, Helvetica, Arial, sans-serif">退出(Q)</text>
  <rect x="554" y="462" width="64" height="20" rx="3" fill="#fff" stroke="#d9d1d5"/>
  <text x="586" y="476" text-anchor="middle" font-size="11" fill="#6c6168" font-family="PingFang SC, Helvetica, Arial, sans-serif">后退(B)</text>
  <rect x="624" y="462" width="64" height="20" rx="3" fill="#fff" stroke="#d6cfd3"/>
  <text x="656" y="476" text-anchor="middle" font-size="11" fill="#6a6067" font-family="Helvetica, Arial, sans-serif">继续</text>
  <g transform="translate(388 524)">
    <circle cx="0" cy="0" r="5" fill="#8c4d92" stroke="#8c4d92" stroke-width="1.5"/><circle cx="18" cy="0" r="5" fill="#8c4d92" stroke="#8c4d92" stroke-width="1.5"/><circle cx="36" cy="0" r="5" fill="#8c4d92" stroke="#8c4d92" stroke-width="1.5"/><circle cx="54" cy="0" r="5" fill="#8c4d92" stroke="#8c4d92" stroke-width="1.5"/><circle cx="72" cy="0" r="5" fill="#8c4d92" stroke="#8c4d92" stroke-width="1.5"/><circle cx="90" cy="0" r="5" fill="#fff" stroke="#8c4d92" stroke-width="1.5"/><circle cx="108" cy="0" r="5" fill="#fff" stroke="#8c4d92" stroke-width="1.5"/>
  </g>

</svg>
