  <text x="420" y="170" font-size="15" fill="#5c5358" font-family="PingFang SC, Helvetica, Arial, sans-serif">回顾您的选择</text>
  <rect x="420" y="190" width="350" height="200" rx="8" fill="#f8f7f8" stroke="#e3dbe0"/>
  <text x="434" y="214" font-size="13" fill="#5a5057" font-family="PingFang SC, Helvetica, Arial, sans-serif">一般</text>
  <text x="610" y="214" font-size="13" fill="#5a5057" font-family="PingFang SC, Helvetica, Arial, sans-serif">手动分区</text>
  <text x="434" y="238" font-size="13" fill="#5a5057" font-family="PingFang SC, Helvetica, Arial, sans-serif">安装磁盘</text>
  <text x="610" y="238" font-size="13" fill="#5a5057" font-family="Helvetica, Arial, sans-serif">QEMU HARDDISK sda</text>
  <text x="434" y="262" font-size="13" fill="#5a5057" font-family="PingFang SC, Helvetica, Arial, sans-serif">应用程序</text>
  <text x="610" y="262" font-size="13" fill="#5a5057" font-family="PingFang SC, Helvetica, Arial, sans-serif">默认集合</text>
  <text x="434" y="296" font-size="13" fill="#5a5057" font-family="PingFang SC, Helvetica, Arial, sans-serif">安全及其他</text>
  <text x="610" y="296" font-size="13" fill="#5a5057" font-family="PingFang SC, Helvetica, Arial, sans-serif">磁盘加密 无</text>
  <text x="434" y="316" font-size="13" fill="#5a5057" font-family="PingFang SC, Helvetica, Arial, sans-serif">专有软件</text>
  <text x="610" y="316" font-size="13" fill="#5a5057" font-family="PingFang SC, Helvetica, Arial, sans-serif">编解码器与驱动程序</text>
  <text x="434" y="340" font-size="13" fill="#5a5057" font-family="PingFang SC, Helvetica, Arial, sans-serif">分区</text>
  <text x="434" y="360" font-size="12" fill="#857a81" font-family="PingFang SC, Helvetica, Arial, sans-serif">分区 sda2 格式化为 fat32 并挂载到 /boot/efi</text>
  <text x="434" y="378" font-size="12" fill="#857a81" font-family="PingFang SC, Helvetica, Arial, sans-serif">分区 sda1 格式化为 ext4 并挂载到 /</text>

  <rect x="126" y="488" width="82" height="28" rx="8" fill="#fff" stroke="#d9d1d5"/><text x="167" y="506" text-anchor="middle" font-size="12" fill="#7f737a" font-family="PingFang SC, Helvetica, Arial, sans-serif">返回</text>
