  <text x="447" y="90" text-anchor="middle" font-size="14" fill="#7c7178" font-family="Helvetica, Arial, sans-serif">准备安装</text>
  <circle cx="772" cy="88" r="8" fill="#f3f0f2" stroke="#d8d1d5"/>
  <path d="M768 84l8 8M776 84l-8 8" stroke="#8f838c" stroke-width="1.5"/>
  
  
  <g transform="translate(154 190)">
