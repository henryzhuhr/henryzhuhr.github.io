<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" role="img" aria-labelledby="title desc">
  <title id="title">Ubuntu network selection screen mockup</title>
  <desc id="desc">A simplified SVG template of the Ubuntu installer network connection screen.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c1030"/>
      <stop offset="50%" stop-color="#5d183b"/>
      <stop offset="100%" stop-color="#1d1029"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#120812" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="880" height="600" rx="18" fill="#0b0b0d"/>
  <rect x="32" y="24" width="816" height="532" rx="12" fill="url(#bg)"/>
  <rect x="32" y="24" width="816" height="16" rx="12" fill="#efebe4"/>
  <circle cx="48" cy="32" r="4" fill="#ff5f57"/>
  <circle cx="62" cy="32" r="4" fill="#febc2e"/>
  <circle cx="76" cy="32" r="4" fill="#28c840"/>
  <rect x="78" y="72" width="738" height="454" rx="18" fill="#fcfbfb" filter="url(#shadow)"/>
  
  <rect x="32" y="40" width="816" height="28" fill="#181818"/>
  <text x="440" y="59" text-anchor="middle" font-size="13" fill="#f2f2f2" font-family="Helvetica, Arial, sans-serif">May 14 06:22</text>
  <rect x="32" y="68" width="42" height="468" fill="#251a28" opacity=".82"/>
  <g fill="#f0f0f0" opacity=".98">
    <circle cx="54" cy="86" r="8"/><circle cx="54" cy="132" r="8"/><circle cx="54" cy="178" r="8"/><circle cx="54" cy="224" r="8"/><circle cx="54" cy="270" r="8"/><circle cx="54" cy="316" r="8"/><circle cx="54" cy="362" r="8"/><circle cx="54" cy="408" r="8"/><circle cx="54" cy="500" r="8"/>
  </g>
  <rect x="778" y="394" width="46" height="68" rx="4" fill="#e95420" opacity=".92"/>
  <rect x="782" y="398" width="24" height="24" rx="4" fill="#fff" opacity=".9"/>
  <text x="801" y="446" text-anchor="middle" font-size="8" fill="#fff" font-family="Helvetica, Arial, sans-serif">Install Ubuntu</text>
  <rect x="786" y="474" width="30" height="30" rx="4" fill="#6f626f" opacity=".65"/>
  <text x="801" y="524" text-anchor="middle" font-size="9" fill="#fff" font-family="Helvetica, Arial, sans-serif">Home</text>
  <text x="447" y="90" text-anchor="middle" font-size="14" fill="#7c7178" font-family="Helvetica, Arial, sans-serif">连接到互联网</text>
  <circle cx="772" cy="88" r="8" fill="#f3f0f2" stroke="#d8d1d5"/>
  <path d="M768 84l8 8M776 84l-8 8" stroke="#8f838c" stroke-width="1.5"/>
  
  <g transform="translate(166 214)">
    <circle cx="86" cy="88" r="52" fill="#fff7f4" stroke="#f0d4c9"/>
    <path d="M52 92c22-20 46-30 68-30s46 10 68 30" fill="none" stroke="#e95420" stroke-width="8" stroke-linecap="round"/>
    <path d="M70 112c12-10 26-16 50-16s38 6 50 16" fill="none" stroke="#e95420" stroke-width="8" stroke-linecap="round"/>
    <path d="M90 132c10-7 20-10 30-10s20 3 30 10" fill="none" stroke="#e95420" stroke-width="8" stroke-linecap="round"/>
    <circle cx="120" cy="150" r="8" fill="#e95420"/>
  </g>
  <text x="420" y="170" font-size="15" fill="#5c5358" font-family="PingFang SC, Helvetica, Arial, sans-serif">连接到互联网</text>
  <text x="420" y="196" font-size="12" fill="#857a81" font-family="PingFang SC, Helvetica, Arial, sans-serif">连接网络后，兼容性检查与附加软件包可以改善您的安装。</text>
  
  <rect x="420" y="228" width="278" height="48" rx="6" fill="#fff" stroke="#e3dbe0"/>
  <circle cx="442" cy="250" r="7" fill="#fff" stroke="#cfc6cb"/>
  <text x="460" y="248" font-size="14" fill="#5a5057" font-family="Helvetica, Arial, sans-serif">使用有线连接</text>
  <text x="460" y="264" font-size="11" fill="#8c8288" font-family="Helvetica, Arial, sans-serif"></text>

  
  <rect x="420" y="278" width="278" height="48" rx="6" fill="#fff" stroke="#e3dbe0"/>
  <circle cx="442" cy="300" r="7" fill="#fff" stroke="#cfc6cb"/>
