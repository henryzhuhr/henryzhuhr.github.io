  <text x="460" y="314" font-size="11" fill="#8c8288" font-family="Helvetica, Arial, sans-serif"></text>

  
  <rect x="420" y="328" width="278" height="48" rx="6" fill="#fff7f4" stroke="#f0a58b"/>
  <circle cx="442" cy="350" r="7" fill="#fff" stroke="#e95420" stroke-width="2"/><circle cx="442" cy="350" r="3" fill="#e95420"/>
  <text x="460" y="348" font-size="14" fill="#322e31" font-family="Helvetica, Arial, sans-serif">我现在不想连接到互联网</text>
  <text x="460" y="364" font-size="11" fill="#8c8288" font-family="Helvetica, Arial, sans-serif"></text>


  <rect x="126" y="488" width="82" height="28" rx="8" fill="#fff" stroke="#d9d1d5"/><text x="167" y="506" text-anchor="middle" font-size="12" fill="#7f737a" font-family="PingFang SC, Helvetica, Arial, sans-serif">返回</text>
  <rect x="688" y="488" width="92" height="30" rx="8" fill="#f2f2f3"/>
  <text x="734" y="507" text-anchor="middle" font-size="14" fill="#aca5ab" font-family="PingFang SC, Helvetica, Arial, sans-serif">下一步</text>
  <g transform="translate(384 500)">
    <circle cx="0" cy="0" r="4" fill="#d6cfd3"/><circle cx="14" cy="0" r="4" fill="#d6cfd3"/><circle cx="28" cy="0" r="4" fill="#e95420"/><circle cx="42" cy="0" r="4" fill="#d6cfd3"/><circle cx="56" cy="0" r="4" fill="#d6cfd3"/><circle cx="70" cy="0" r="4" fill="#d6cfd3"/><circle cx="84" cy="0" r="4" fill="#d6cfd3"/><circle cx="98" cy="0" r="4" fill="#d6cfd3"/><circle cx="112" cy="0" r="4" fill="#d6cfd3"/><circle cx="126" cy="0" r="4" fill="#d6cfd3"/>
  </g>

</svg>
