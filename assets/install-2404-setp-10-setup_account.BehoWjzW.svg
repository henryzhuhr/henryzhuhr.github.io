<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" role="img" aria-labelledby="title desc">
  <title id="title">Ubuntu installer account setup mockup</title>
  <desc id="desc">A simplified SVG template of the Ubuntu installer account setup screen.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c1030"/>
      <stop offset="50%" stop-color="#5d183b"/>
      <stop offset="100%" stop-color="#1d1029"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#120812" flood-opacity=".28"/>
    </filter>
  </defs>

  <rect width="880" height="600" rx="18" fill="#0b0b0d"/>
  <rect x="32" y="24" width="816" height="532" rx="12" fill="url(#bg)"/>
  <rect x="32" y="24" width="816" height="16" rx="12" fill="#efebe4"/>
  <circle cx="48" cy="32" r="4" fill="#ff5f57"/>
  <circle cx="62" cy="32" r="4" fill="#febc2e"/>
  <circle cx="76" cy="32" r="4" fill="#28c840"/>

  <rect x="78" y="72" width="738" height="454" rx="18" fill="#fcfbfb" filter="url(#shadow)"/>
  <text x="447" y="90" text-anchor="middle" font-size="14" fill="#7c7178" font-family="PingFang SC, Helvetica, Arial, sans-serif">设置您的帐户</text>
  <circle cx="772" cy="88" r="8" fill="#f3f0f2" stroke="#d8d1d5"/>
  <path d="M768 84l8 8M776 84l-8 8" stroke="#8f838c" stroke-width="1.5"/>

  <g transform="translate(152 190)">
    <rect x="28" y="6" width="92" height="120" rx="14" fill="#fff" stroke="#d9d1d5"/>
    <rect x="40" y="18" width="68" height="84" rx="8" fill="#fff7f4" stroke="#f0d4c9"/>
    <rect x="48" y="30" width="30" height="30" rx="6" fill="#e95420"/>
    <path d="M63 36v18M54 45h18" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M52 70h44M52 80h44M52 90h26" stroke="#d4c7cc" stroke-width="3" stroke-linecap="round"/>
    <circle cx="138" cy="36" r="22" fill="#e95420"/>
    <path d="M138 24v24M126 36h24" stroke="#fff" stroke-width="3.2" stroke-linecap="round"/>
    <path d="M110 112c18-16 46-16 64 0" fill="none" stroke="#d8d0d4" stroke-width="4" stroke-linecap="round"/>
    <circle cx="116" cy="118" r="12" fill="#fff" stroke="#d9d1d5"/>
    <path d="M116 111v14M109 118h14" stroke="#e95420" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="168" cy="112" r="17" fill="#efeff1" stroke="#d9d1d5"/>
    <circle cx="168" cy="112" r="8" fill="none" stroke="#9c9298" stroke-width="2"/>
    <path d="M168 96v6M168 122v6M152 112h6M178 112h6M157 101l4 4M175 119l4 4M179 101l-4 4M161 119l-4 4" stroke="#9c9298" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <g transform="translate(420 168)">
    <text x="0" y="0" font-size="15" fill="#5c5358" font-family="PingFang SC, Helvetica, Arial, sans-serif">设置您的帐户</text>

    <text x="0" y="28" font-size="12" fill="#857a81" font-family="PingFang SC, Helvetica, Arial, sans-serif">您的姓名</text>
    <rect x="0" y="34" width="260" height="22" rx="6" fill="#fff" stroke="#e3dbe0"/>
    <text x="12" y="49" font-size="13" fill="#443f44" font-family="Helvetica, Arial, sans-serif">ubuntu</text>
    <circle cx="272" cy="45" r="7" fill="#26a641"/>
    <path d="M268 45l3 3 5-6" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="0" y="78" font-size="12" fill="#857a81" font-family="PingFang SC, Helvetica, Arial, sans-serif">您的电脑主机名</text>
    <rect x="0" y="84" width="260" height="22" rx="6" fill="#fff" stroke="#e3dbe0"/>
    <text x="12" y="99" font-size="13" fill="#7d7379" font-family="Helvetica, Arial, sans-serif">ubuntu-Standard-PC-Q35-ICH9-2009</text>
    <circle cx="272" cy="95" r="7" fill="#26a641"/>
    <path d="M268 95l3 3 5-6" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="0" y="128" font-size="12" fill="#857a81" font-family="PingFang SC, Helvetica, Arial, sans-serif">键入一个用户名</text>
    <rect x="0" y="134" width="260" height="22" rx="6" fill="#fff" stroke="#e3dbe0"/>
    <text x="12" y="149" font-size="13" fill="#443f44" font-family="Helvetica, Arial, sans-serif">ubuntu</text>
    <circle cx="272" cy="145" r="7" fill="#26a641"/>
    <path d="M268 145l3 3 5-6" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="0" y="178" font-size="12" fill="#857a81" font-family="PingFang SC, Helvetica, Arial, sans-serif">选择一个密码</text>
    <rect x="0" y="184" width="180" height="22" rx="6" fill="#fff" stroke="#e3dbe0"/>
    <text x="12" y="199" font-size="13" fill="#443f44" font-family="Helvetica, Arial, sans-serif">........</text>
    <rect x="150" y="184" width="60" height="22" rx="6" fill="#efeff1"/>
    <circle cx="167" cy="195" r="4.5" fill="none" stroke="#9f949b" stroke-width="1.4"/>
    <path d="M158 195c4-5 14-5 18 0" fill="none" stroke="#9f949b" stroke-width="1.4"/>
    <text x="188" y="199" font-size="11" fill="#7e747b" font-family="PingFang SC, Helvetica, Arial, sans-serif">显示</text>
    <text x="222" y="199" font-size="12" fill="#e95420" font-family="PingFang SC, Helvetica, Arial, sans-serif">密码强度：较弱</text>

    <text x="0" y="228" font-size="12" fill="#857a81" font-family="PingFang SC, Helvetica, Arial, sans-serif">确认您的密码</text>
    <rect x="0" y="234" width="260" height="22" rx="6" fill="#fff" stroke="#e3dbe0"/>
    <text x="12" y="249" font-size="13" fill="#443f44" font-family="Helvetica, Arial, sans-serif">........</text>
    <circle cx="272" cy="245" r="7" fill="#26a641"/>
    <path d="M268 245l3 3 5-6" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="14" y="274" width="12" height="12" rx="2" fill="#e95420"/>
    <path d="M17 280l2 2 4-5" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="34" y="284" font-size="13" fill="#5a5057" font-family="PingFang SC, Helvetica, Arial, sans-serif">登录时需要密码</text>

    <rect x="14" y="306" width="12" height="12" rx="2" fill="#fff" stroke="#cfc6cb"/>
    <text x="34" y="316" font-size="13" fill="#5a5057" font-family="PingFang SC, Helvetica, Arial, sans-serif">使用活动目录</text>
  </g>

  <rect x="126" y="488" width="82" height="28" rx="8" fill="#fff" stroke="#d9d1d5"/>
  <text x="167" y="506" text-anchor="middle" font-size="12" fill="#7f737a" font-family="PingFang SC, Helvetica, Arial, sans-serif">返回</text>
  <rect x="688" y="488" width="92" height="30" rx="8" fill="#f2f2f3"/>
  <text x="734" y="507" text-anchor="middle" font-size="14" fill="#aca5ab" font-family="PingFang SC, Helvetica, Arial, sans-serif">下一步</text>

  <g transform="translate(384 500)">
    <circle cx="0" cy="0" r="4" fill="#d6cfd3"/>
    <circle cx="14" cy="0" r="4" fill="#d6cfd3"/>
    <circle cx="28" cy="0" r="4" fill="#d6cfd3"/>
    <circle cx="42" cy="0" r="4" fill="#d6cfd3"/>
    <circle cx="56" cy="0" r="4" fill="#d6cfd3"/>
    <circle cx="70" cy="0" r="4" fill="#d6cfd3"/>
    <circle cx="84" cy="0" r="4" fill="#e95420"/>
    <circle cx="98" cy="0" r="4" fill="#d6cfd3"/>
  </g>
</svg>
