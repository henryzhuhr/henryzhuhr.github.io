<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" role="img" aria-labelledby="title desc">
  <title id="title">Ubuntu optimize computer screen mockup</title>
  <desc id="desc">A simplified SVG template of the Ubuntu installer optimize your computer screen.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c1030"/>
      <stop offset="50%" stop-color="#5d183b"/>
      <stop offset="100%" stop-color="#1d1029"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#120812" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="880" height="600" rx="18" fill="#0b0b0d"/>
  <rect x="32" y="24" width="816" height="532" rx="12" fill="url(#bg)"/>
  <rect x="32" y="24" width="816" height="16" rx="12" fill="#efebe4"/>
  <circle cx="48" cy="32" r="4" fill="#ff5f57"/>
  <circle cx="62" cy="32" r="4" fill="#febc2e"/>
  <circle cx="76" cy="32" r="4" fill="#28c840"/>
  <rect x="78" y="72" width="738" height="454" rx="18" fill="#fcfbfb" filter="url(#shadow)"/>
  
  <rect x="32" y="40" width="816" height="28" fill="#181818"/>
  <text x="440" y="59" text-anchor="middle" font-size="13" fill="#f2f2f2" font-family="Helvetica, Arial, sans-serif">May 14 06:22</text>
  <rect x="32" y="68" width="42" height="468" fill="#251a28" opacity=".82"/>
  <g fill="#f0f0f0" opacity=".98">
    <circle cx="54" cy="86" r="8"/><circle cx="54" cy="132" r="8"/><circle cx="54" cy="178" r="8"/><circle cx="54" cy="224" r="8"/><circle cx="54" cy="270" r="8"/><circle cx="54" cy="316" r="8"/><circle cx="54" cy="362" r="8"/><circle cx="54" cy="408" r="8"/><circle cx="54" cy="500" r="8"/>
  </g>
  <rect x="778" y="394" width="46" height="68" rx="4" fill="#e95420" opacity=".92"/>
  <rect x="782" y="398" width="24" height="24" rx="4" fill="#fff" opacity=".9"/>
  <text x="801" y="446" text-anchor="middle" font-size="8" fill="#fff" font-family="Helvetica, Arial, sans-serif">Install Ubuntu</text>
  <rect x="786" y="474" width="30" height="30" rx="4" fill="#6f626f" opacity=".65"/>
  <text x="801" y="524" text-anchor="middle" font-size="9" fill="#fff" font-family="Helvetica, Arial, sans-serif">Home</text>
  <text x="447" y="90" text-anchor="middle" font-size="14" fill="#7c7178" font-family="Helvetica, Arial, sans-serif">优化您的计算机</text>
  <circle cx="772" cy="88" r="8" fill="#f3f0f2" stroke="#d8d1d5"/>
  <path d="M768 84l8 8M776 84l-8 8" stroke="#8f838c" stroke-width="1.5"/>
  
  
  <g transform="translate(176 236)">
    <rect x="24" y="18" width="82" height="106" rx="14" fill="#fff" stroke="#d9d1d5"/>
    <path d="M40 40h42M40 54h42M40 68h28" stroke="#d4c7cc" stroke-width="3" stroke-linecap="round"/>
    <rect x="40" y="84" width="34" height="24" rx="4" fill="#fff7f4" stroke="#f0d4c9"/>
    <path d="M46 96h22" stroke="#e95420" stroke-width="3" stroke-linecap="round"/>
    <circle cx="126" cy="48" r="22" fill="#e95420"/>
    <path d="M126 36v24M114 48h24" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="108" cy="132" r="12" fill="#fff" stroke="#d9d1d5"/>
    <path d="M108 125v14M101 132h14" stroke="#e95420" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="156" cy="124" r="16" fill="#efeff1" stroke="#d9d1d5"/>
    <circle cx="156" cy="124" r="7" fill="none" stroke="#9c9298" stroke-width="2"/>
  </g>

  <text x="418" y="236" font-size="15" fill="#5c5358" font-family="PingFang SC, Helvetica, Arial, sans-serif">安装推荐的专有软件吗？</text>
  <text x="418" y="264" font-size="12" fill="#857a81" font-family="PingFang SC, Helvetica, Arial, sans-serif">Ubuntu 默认情况下不自带专有软件。安装额外软件可能会改善计算机</text>
  <text x="418" y="282" font-size="12" fill="#857a81" font-family="PingFang SC, Helvetica, Arial, sans-serif">的性能。</text>
  <rect x="434" y="308" width="14" height="14" rx="3" fill="#e95420"/>
  <path d="M437 315l2 2 5-6" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="456" y="320" font-size="13" fill="#5a5057" font-family="PingFang SC, Helvetica, Arial, sans-serif">为图形和 Wi-Fi 硬件安装第三方软件</text>
  <text x="456" y="338" font-size="12" fill="#8c8288" font-family="PingFang SC, Helvetica, Arial, sans-serif">包括但不限于 NVIDIA 驱动与类似软件</text>
  <rect x="434" y="348" width="14" height="14" rx="3" fill="#e95420"/>
  <path d="M437 355l2 2 5-6" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="456" y="360" font-size="13" fill="#5a5057" font-family="PingFang SC, Helvetica, Arial, sans-serif">下载并安装对其他媒体格式的支持</text>
  <text x="456" y="378" font-size="12" fill="#8c8288" font-family="PingFang SC, Helvetica, Arial, sans-serif">包括但不限于 MP3、MP4、MOV 及类似格式的编解码器</text>

  <rect x="126" y="488" width="82" height="28" rx="8" fill="#fff" stroke="#d9d1d5"/><text x="167" y="506" text-anchor="middle" font-size="12" fill="#7f737a" font-family="PingFang SC, Helvetica, Arial, sans-serif">返回</text>
  <rect x="688" y="488" width="92" height="30" rx="8" fill="#f2f2f3"/>
  <text x="734" y="507" text-anchor="middle" font-size="14" fill="#aca5ab" font-family="PingFang SC, Helvetica, Arial, sans-serif">下一步</text>
  <g transform="translate(384 500)">
    <circle cx="0" cy="0" r="4" fill="#d6cfd3"/><circle cx="14" cy="0" r="4" fill="#d6cfd3"/><circle cx="28" cy="0" r="4" fill="#d6cfd3"/><circle cx="42" cy="0" r="4" fill="#d6cfd3"/><circle cx="56" cy="0" r="4" fill="#d6cfd3"/><circle cx="70" cy="0" r="4" fill="#e95420"/><circle cx="84" cy="0" r="4" fill="#d6cfd3"/><circle cx="98" cy="0" r="4" fill="#d6cfd3"/><circle cx="112" cy="0" r="4" fill="#d6cfd3"/><circle cx="126" cy="0" r="4" fill="#d6cfd3"/>
  </g>

</svg>
