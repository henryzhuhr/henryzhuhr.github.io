    <circle cx="0" cy="0" r="4" fill="#e95420"/><circle cx="14" cy="0" r="4" fill="#d6cfd3"/><circle cx="28" cy="0" r="4" fill="#d6cfd3"/><circle cx="42" cy="0" r="4" fill="#d6cfd3"/><circle cx="56" cy="0" r="4" fill="#d6cfd3"/><circle cx="70" cy="0" r="4" fill="#d6cfd3"/><circle cx="84" cy="0" r="4" fill="#d6cfd3"/><circle cx="98" cy="0" r="4" fill="#d6cfd3"/><circle cx="112" cy="0" r="4" fill="#d6cfd3"/><circle cx="126" cy="0" r="4" fill="#d6cfd3"/>
  </g>

</svg>
