  <text x="460" y="304" font-size="11" fill="#8c8288" font-family="Helvetica, Arial, sans-serif"></text>

  
  <rect x="420" y="318" width="278" height="48" rx="6" fill="#fff" stroke="#e3dbe0"/>
  <circle cx="442" cy="340" r="7" fill="#fff" stroke="#cfc6cb"/>
  <text x="460" y="338" font-size="14" fill="#5a5057" font-family="Helvetica, Arial, sans-serif">打字</text>
  <text x="460" y="354" font-size="11" fill="#8c8288" font-family="Helvetica, Arial, sans-serif"></text>

  
  <rect x="420" y="368" width="278" height="48" rx="6" fill="#fff" stroke="#e3dbe0"/>
  <circle cx="442" cy="390" r="7" fill="#fff" stroke="#cfc6cb"/>
  <text x="460" y="388" font-size="14" fill="#5a5057" font-family="Helvetica, Arial, sans-serif">指向和点击</text>
  <text x="460" y="404" font-size="11" fill="#8c8288" font-family="Helvetica, Arial, sans-serif"></text>


  <rect x="126" y="488" width="82" height="28" rx="8" fill="#fff" stroke="#d9d1d5"/><text x="167" y="506" text-anchor="middle" font-size="12" fill="#7f737a" font-family="PingFang SC, Helvetica, Arial, sans-serif">返回</text>
  <rect x="688" y="488" width="92" height="30" rx="8" fill="#f2f2f3"/>
  <text x="734" y="507" text-anchor="middle" font-size="14" fill="#aca5ab" font-family="PingFang SC, Helvetica, Arial, sans-serif">下一步</text>
