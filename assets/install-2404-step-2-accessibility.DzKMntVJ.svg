  <text x="460" y="254" font-size="11" fill="#8c8288" font-family="Helvetica, Arial, sans-serif"></text>

  
  <rect x="420" y="268" width="278" height="48" rx="6" fill="#fff" stroke="#e3dbe0"/>
  <circle cx="442" cy="290" r="7" fill="#fff" stroke="#cfc6cb"/>
